<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="dark">
    <div class="topo">
      <button id="toggle-tema" class="toggle-tema" aria-label="Alternar tema">
        ☀️
      </button>
    </div>
    <main class="app">
      <h1>As minhas tarefas</h1>

      <form id="form-tarefa">
        <input
          type="text"
          id="input-tarefa"
          placeholder="Escreve uma tarefa..."
          autocomplete="off"
        />
        <button type="submit">Adicionar</button>
      </form>

      <ul id="lista-tarefas">
        <!-- as tarefas vão aparecer aqui, criadas pelo JavaScript -->
      </ul>
    </main>

    <script src="todo-list.js"></script>
  </body>
</html>
